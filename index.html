<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計算機</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .current {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 400;
      padding: 18px 0;
      cursor: pointer;
      transition: all 0.1s ease;
      outline: none;
    }

    button:active {
      transform: scale(0.94);
    }

    .btn-number {
      background: #1a365d;
      color: #e2e8f0;
    }

    .btn-number:hover {
      background: #2a4a7f;
    }

    .btn-operator {
      background: #2d3748;
      color: #90cdf4;
    }

    .btn-operator:hover {
      background: #4a5568;
    }

    .btn-clear {
      background: #742a2a;
      color: #feb2b2;
    }

    .btn-clear:hover {
      background: #9b2c2c;
    }

    .btn-equals {
      background: #2b6cb0;
      color: white;
    }

    .btn-equals:hover {
      background: #3182ce;
    }

    .btn-zero {
      grid-column: span 2;
    }

    .btn-sign {
      background: #2d3748;
      color: #90cdf4;
    }

    .btn-sign:hover {
      background: #4a5568;
    }

    .btn-percent {
      background: #2d3748;
      color: #90cdf4;
    }

    .btn-percent:hover {
      background: #4a5568;
    }

    .btn-backspace {
      background: #744210;
      color: #fbd38d;
      font-size: 18px;
    }

    .btn-backspace:hover {
      background: #975a16;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-sign" onclick="toggleSign()">+/-</button>
      <button class="btn-percent" onclick="percent()">%</button>
      <button class="btn-operator" onclick="setOperator('÷')">÷</button>

      <button class="btn-number" onclick="appendNumber('7')">7</button>
      <button class="btn-number" onclick="appendNumber('8')">8</button>
      <button class="btn-number" onclick="appendNumber('9')">9</button>
      <button class="btn-operator" onclick="setOperator('×')">×</button>

      <button class="btn-number" onclick="appendNumber('4')">4</button>
      <button class="btn-number" onclick="appendNumber('5')">5</button>
      <button class="btn-number" onclick="appendNumber('6')">6</button>
      <button class="btn-operator" onclick="setOperator('-')">−</button>

      <button class="btn-number" onclick="appendNumber('1')">1</button>
      <button class="btn-number" onclick="appendNumber('2')">2</button>
      <button class="btn-number" onclick="appendNumber('3')">3</button>
      <button class="btn-operator" onclick="setOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="appendNumber('0')">0</button>
      <button class="btn-number" onclick="appendDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let resetNext = false;

    const currentEl = document.getElementById('current');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      currentEl.textContent = current;
    }

    function appendNumber(num) {
      if (resetNext) {
        current = num;
        resetNext = false;
      } else {
        current = current === '0' ? num : current + num;
      }
      if (current.length > 12) current = current.slice(0, 12);
      updateDisplay();
    }

    function appendDecimal() {
      if (resetNext) {
        current = '0.';
        resetNext = false;
      } else if (!current.includes('.')) {
        current += '.';
      }
      updateDisplay();
    }

    function setOperator(op) {
      if (operator && !resetNext) {
        calculate(true);
      }
      previous = parseFloat(current);
      operator = op;
      resetNext = true;
      expressionEl.textContent = `${previous} ${op}`;
    }

    function calculate(silent = false) {
      if (operator === null || previous === null) return;

      const curr = parseFloat(current);
      let result;

      switch (operator) {
        case '+': result = previous + curr; break;
        case '-': result = previous - curr; break;
        case '×': result = previous * curr; break;
        case '÷':
          if (curr === 0) {
            current = 'エラー';
            expressionEl.textContent = '';
            operator = null;
            previous = null;
            updateDisplay();
            return;
          }
          result = previous / curr;
          break;
      }

      if (!silent) {
        expressionEl.textContent = `${previous} ${operator} ${curr} =`;
      }

      result = parseFloat(result.toPrecision(12));
      current = String(result);
      if (!silent) {
        operator = null;
        previous = null;
      } else {
        previous = result;
      }
      resetNext = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = null;
      operator = null;
      resetNext = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (current !== '0' && current !== 'エラー') {
        current = current.startsWith('-') ? current.slice(1) : '-' + current;
        updateDisplay();
      }
    }

    function percent() {
      if (current !== 'エラー') {
        current = String(parseFloat(current) / 100);
        updateDisplay();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
      else if (e.key === '.') appendDecimal();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('×');
      else if (e.key === '/') { e.preventDefault(); setOperator('÷'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1 && current !== 'エラー') {
          current = current.slice(0, -1);
        } else {
          current = '0';
        }
        updateDisplay();
      }
    });
  </script>
</body>
</html>
